version: '3.8'

services:
  backend:
    build:
      context: ./backend
    image: ${AWS_ECR_REGISTRY:-123456789012.dkr.ecr.us-east-1.amazonaws.com}/dentex-backend:latest
    container_name: dentex-backend
    restart: always
    environment:
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/workspace/uploads
      - ./backend/predictions:/workspace/predictions
      - ./backend/trained_models:/workspace/trained_models

  frontend:
    build:
      context: ./frontend
    image: ${AWS_ECR_REGISTRY:-123456789012.dkr.ecr.us-east-1.amazonaws.com}/dentex-frontend:latest
    container_name: dentex-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
